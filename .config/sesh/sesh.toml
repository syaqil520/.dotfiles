#:schema https://github.com/joshmedeski/sesh/raw/main/sesh.schema.json

[[session]]
name = "workspace"
path = "~/workspace"
preview_command = "eza -D --icons --group-directories-first"

[[session]]
name = "tmuxconf"
path = "~/dotfiles/.config/tmux"
startup_command = "nvim tmux.conf"
preview_command = "bat --color=always ~/dotfiles/.config/tmux/tmux.conf"

[[session]]
name = "nvimconf"
path = "~/dotfiles/.config/nvim"
startup_command = "nvim ."

[[session]]
name = "dotfilesconf"
path = "~/dotfiles/.config"
